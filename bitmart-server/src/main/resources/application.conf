# BitMart 服务端配置。所有业务阈值集中于此，可通过环境变量覆盖（见各 ${?ENV} 占位）。
ktor {
    deployment {
        port = 8080
        port = ${?PORT}
    }
    application {
        modules = [ cn.edu.bit.bitmart.ApplicationKt.module ]
    }
}

bitmart {
    # 数据库连接（HikariCP）。
    database {
        url = "jdbc:postgresql://localhost:5432/bitmart"
        url = ${?BITMART_DB_URL}
        user = "bitmart"
        user = ${?BITMART_DB_USER}
        password = "bitmart"
        password = ${?BITMART_DB_PASSWORD}
        maxPoolSize = 10
        maxPoolSize = ${?BITMART_DB_POOL_SIZE}
    }

    # 会话与令牌。
    session {
        # 会话有效期（天）。
        ttlDays = 30
        ttlDays = ${?BITMART_SESSION_TTL_DAYS}
    }

    # 身份验证票（BIT101 校验通过后签发，用于注册/重置密码）。
    verifyTicket {
        ttlMinutes = 15
        ttlMinutes = ${?BITMART_VERIFY_TICKET_TTL_MINUTES}
    }

    # 密码策略。
    password {
        minLength = 8
        minLength = ${?BITMART_PASSWORD_MIN_LENGTH}
        # 要求的字符类别数（小写/大写/数字/符号 中至少几类）。
        minCharClasses = 2
        minCharClasses = ${?BITMART_PASSWORD_MIN_CHAR_CLASSES}
    }

    # Argon2id 参数（OWASP 推荐起步值）。
    argon2 {
        memoryKb = 65536
        iterations = 3
        parallelism = 1
    }

    # 商品/需求过期窗口（天）。创建与延期同源校验。
    expiry {
        minDays = 1
        minDays = ${?BITMART_EXPIRY_MIN_DAYS}
        maxDays = 365
        maxDays = ${?BITMART_EXPIRY_MAX_DAYS}
        defaultDays = 30
        defaultDays = ${?BITMART_EXPIRY_DEFAULT_DAYS}
    }

    # 标签数量上限（单条 listing）。
    tag {
        maxPerListing = 8
        maxPerListing = ${?BITMART_TAG_MAX_PER_LISTING}
        maxNameLength = 20
    }

    # 列表分页（keyset）。
    pagination {
        defaultPageSize = 20
        maxPageSize = 50
    }

    # 图片上传限制。
    upload {
        maxFileBytes = 5242880        # 5 MiB
        maxFileBytes = ${?BITMART_UPLOAD_MAX_FILE_BYTES}
        maxFilesPerListing = 9
        allowedMimeTypes = [ "image/jpeg", "image/png", "image/webp" ]
    }

    # 本地磁盘 Blob 存储。
    storage {
        root = "./storage"
        root = ${?BITMART_STORAGE_ROOT}
        publicBaseUrl = "/static"
    }

    # 应用内通知：过期提醒定时任务（架构 §9，每小时检查 24h 内到期的发布项）。
    notification {
        expiryWarnWindowHours = 24
        expiryWarnWindowHours = ${?BITMART_EXPIRY_WARN_WINDOW_HOURS}
        expiryWarnIntervalMinutes = 60
        expiryWarnIntervalMinutes = ${?BITMART_EXPIRY_WARN_INTERVAL_MINUTES}
    }

    # BIT101 统一身份认证代理。
    bit101 {
        baseUrl = "https://bit101.flwfdd.xyz"
        baseUrl = ${?BITMART_BIT101_BASE_URL}
        requestTimeoutMs = 60000
    }

    # ShowAPI（万维易源）ISBN 查询。
    showapi {
        baseUrl = "https://route.showapi.com"
        baseUrl = ${?BITMART_SHOWAPI_BASE_URL}
        appKey = ""
        appKey = ${?BITMART_SHOWAPI_APP_KEY}
        requestTimeoutMs = 60000
    }
}
